name: Upload Idris2 pack state
description: >-
  Tar all pack folders and upload it as an artifact.
  Pair it with the restore-pack-state action in a later job.
  Call this after your own pack setup/build to publish the state downstream.

inputs:
  package:
    description: The package name; used for the artifact name and exposed as an output for restore-pack-state.
    required: true
  collection:
    description: Pack collection disambiguating the artifact (e.g. latest or HEAD).
    required: true
  label:
    description: Optional extra label appended to the artifact name.
    required: false
    default: ""
  project_dir:
    description: Directory holding the .ipkg and pack.toml.
    required: false
    default: .
  build_dir:
    description: The package's build dir, relative to project_dir.
    required: false
    default: build

outputs:
  state:
    description: Restore handle to pass to restore-pack-state.
    value: ${{ steps.describe.outputs.state }}

runs:
  using: composite
  steps:
    - name: Describe the uploaded pack state
      id: describe
      shell: bash
      env:
        PACKAGE: ${{ inputs.package }}
        COLLECTION: ${{ inputs.collection }}
        LABEL: ${{ inputs.label }}
      run: |
        state="pack-state-$PACKAGE-$COLLECTION"
        if [ -n "$LABEL" ]; then
          state="$state-$LABEL"
        fi

        echo "state=$state" >> "$GITHUB_OUTPUT"

    - run: sleep 2 # avoid such error during next step. tar: /root/.cache/pack: file changed as we read it
      shell: bash

    - name: Tar the pack state and build dir
      shell: bash
      working-directory: ${{ inputs.project_dir }}
      env:
        BUILD_DIR: ${{ inputs.build_dir }}
        STATE: ${{ steps.describe.outputs.state }}
      run: |
        # Copied from https://github.com/buzden/deptycheck/blob/a1a6b5777f52d8ece7e004708b2db53fd737af2e/.github/tar-pack
        # A single archive holds the pack folders plus the project's build dir and pack.toml, all with absolute paths.
        # Named per package, collection and label, so several artifacts can be uploaded in one workflow.
        paths=("$PWD/$BUILD_DIR")
        [ -f "$PWD/pack.toml" ] && paths+=("$PWD/pack.toml")
        for d in "${PACK_USER_DIR:-$HOME/.config/pack}" \
                 "${PACK_STATE_DIR:-$HOME/.local/state/pack}" \
                 "${PACK_CACHE_DIR:-$HOME/.cache/pack}" \
                 "${PACK_BIN_DIR:-$HOME/.local/bin}"; do
          [ -d "$d" ] && paths+=("$d")
        done

        tar -cf "$GITHUB_WORKSPACE/$STATE.tar" --exclude=.git "${paths[@]}"

    - name: Upload pack state and build dir
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.describe.outputs.state }}
        path: ${{ steps.describe.outputs.state }}.tar
