name: Restore cached Idris2 build
description: >-
  Restore a build produced by the build-and-test workflow (with `enable_cache`).
  Downloads the uploaded archive (pack state + build dir) and untars it into
  place, so you can run your own `pack test`/`pack run` against the restored build
  without re-resolving dependencies.

inputs:
  package:
    description: The package name (the `package` workflow output).
    required: true
  mode:
    description: Variant mode (`latest-pack-collection` or `bleeding-edge-compiler`).
    required: true
  project_dir:
    description: Directory holding the .ipkg and pack.toml (the `project_dir` workflow output).
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Download the packed build
      uses: actions/download-artifact@v7
      with:
        name: pack-state-${{ inputs.package }}-${{ inputs.mode }}

    - name: Recreate the bleeding-edge pack.toml entry
      if: inputs.mode == 'bleeding-edge-compiler'
      shell: bash
      working-directory: ${{ inputs.project_dir }}
      run: |
        { echo; echo "[idris2]"; echo 'commit = "latest:main"'; } >> pack.toml

    - name: Untar the pack state and build dir
      shell: bash
      env:
        PACKAGE: ${{ inputs.package }}
      run: |
        # Everything was tarred with absolute paths.
        # `--touch` sets mtimes to now, so no need to refresh build timestamps.
        tar -xf "$GITHUB_WORKSPACE/pack-$PACKAGE.tar" --one-top-level=/ --touch
