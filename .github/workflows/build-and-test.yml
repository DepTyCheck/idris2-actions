name: Build and test

on:
  workflow_call:
    inputs:
      ipkg_path:
        description: Path to the .ipkg to build and test. By default expects .ipkg in repo root.
        required: false
        type: string
        default: ""
      container_tag:
        description: Tag for the ghcr.io/stefan-hoeck/idris2-pack container.
        required: false
        type: string
        default: latest
      pack_collections:
        description: JSON array of pack collections to build, e.g. ["latest"] or ["latest", "HEAD"]. Empty array keeps the automatic latest/HEAD selection.
        required: false
        type: string
        default: "[]"
      run_tests:
        description: Run `pack test` after building. Set false to only build and cache.
        required: false
        type: boolean
        default: true
      enable_cache:
        description: Tar the pack state and build dir after testing and upload them as artifacts to restore pack state in other jobs.
        required: false
        type: boolean
        default: true
    outputs:
      collections:
        description: JSON array of pack collection names.
        value: ${{ jobs.get-upstream-matrix.outputs.collections }}
      package:
        description: The package name parsed from the .ipkg.
        value: ${{ jobs.get-upstream-matrix.outputs.package }}
      project_dir:
        description: Directory holding the .ipkg and pack.toml.
        value: ${{ jobs.get-upstream-matrix.outputs.project_dir }}
      build_dir:
        description: The package's build dir (relative to project_dir).
        value: ${{ jobs.get-upstream-matrix.outputs.build_dir }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.ipkg_path }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  get-upstream-matrix:
    name: Acquire matrix of pack collections
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:${{ inputs.container_tag }}
    outputs:
      collections: ${{ steps.matrix.outputs.collections }}
      package: ${{ steps.matrix.outputs.package }}
      project_dir: ${{ steps.matrix.outputs.project_dir }}
      build_dir: ${{ steps.matrix.outputs.build_dir }}
      hash: ${{ steps.matrix.outputs.hash }}
      current: ${{ steps.matrix.outputs.current }}
      upstream: ${{ steps.matrix.outputs.upstream }}
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Find the package .ipkg
        env:
          IPKG_PATH: ${{ inputs.ipkg_path }}
        run: |
          ipkg="$IPKG_PATH"

          if [ -n "$ipkg" ]; then
            echo "Using provided ipkg_path: $ipkg"
          else
            mapfile -t root_ipkgs < <(find . -maxdepth 1 -name '*.ipkg' -type f)

            case ${#root_ipkgs[@]} in
              0)
                echo "error: no .ipkg found in repo root; set ipkg_path"
                exit 1
                ;;
              1)
                ipkg="${root_ipkgs[0]}"
                ;;
              *)
                echo "error: multiple .ipkg found in repo root; set ipkg_path to pick one:"
                printf '  %s\n' "${root_ipkgs[@]}"
                exit 1
                ;;
            esac
          fi

          if [ ! -f "$ipkg" ]; then
            echo "error: ipkg not found: $ipkg"
            exit 1
          fi

          {
            echo "IPKG=$ipkg"
            echo "PROJECT_DIR=$(dirname "$ipkg")"
          } >> "$GITHUB_ENV"

      - name: Parse package name and build dir
        run: |
          package=$(awk '/^[[:space:]]*package[[:space:]]/ {print $2; exit}' "$IPKG")

          builddir_line=$(awk '/^[[:space:]]*builddir[[:space:]]*=/ {print; exit}' "$IPKG") # find the line
          build_dir="${builddir_line#*=}"           # get the path
          build_dir="${build_dir//[\"[:space:]]/}"  # strip quotes
          build_dir="${build_dir:-build}"           # set default `build`

          echo "Package '$package', build dir '$build_dir'"
          {
            echo "PACKAGE=$package"
            echo "BUILD_DIR=$build_dir"
          } >> "$GITHUB_ENV"

      - name: Hash sources for the cache key
        run: |
          # Hash of the package's sources
          # from https://stackoverflow.com/q/545387
          hash=$(find "$PROJECT_DIR/src" "$IPKG" "$PROJECT_DIR/pack.toml" -type f -print0 2>/dev/null \
            | sort -z | xargs -0 sha256sum | sha256sum | cut -c1-16)

          echo "Source hash: $hash"
          echo "HASH=$hash" >> "$GITHUB_ENV"

      - name: Compute build collections
        id: matrix
        env:
          PACK_COLLECTIONS: ${{ inputs.pack_collections }}
        run: |
          current=$(idris2 --version | sed 's/.*-//')
          upstream=$(git ls-remote https://github.com/idris-lang/Idris2 main | head -c 9)
          echo "Current: $current, bleeding edge: $upstream"

          if [ "$PACK_COLLECTIONS" != "[]" ]; then
            collections="$PACK_COLLECTIONS"
          elif [ "$current" = "$upstream" ]; then
            collections='["latest"]'
          else
            collections='["latest","HEAD"]'
          fi

          echo "Collections: $collections"

          {
            echo "package=$PACKAGE"
            echo "project_dir=$PROJECT_DIR"
            echo "build_dir=$BUILD_DIR"
            echo "collections=$collections"
            echo "hash=$HASH"
            echo "current=$current"
            echo "upstream=$upstream"
          } >> "$GITHUB_OUTPUT"

  build-and-test:
    name: Build & test ${{ needs.get-upstream-matrix.outputs.package }} (${{ matrix.collection }})
    needs: get-upstream-matrix
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:${{ inputs.container_tag }}
    env:
      PROJECT_DIR: ${{ needs.get-upstream-matrix.outputs.project_dir }}
      BUILD_DIR: ${{ needs.get-upstream-matrix.outputs.build_dir }}
      HASH: ${{ needs.get-upstream-matrix.outputs.hash }}
      CURRENT: ${{ needs.get-upstream-matrix.outputs.current }}
      UPSTREAM: ${{ needs.get-upstream-matrix.outputs.upstream }}
    strategy:
      fail-fast: false
      matrix:
        collection: ${{ fromJSON(needs.get-upstream-matrix.outputs.collections) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update pack database
        working-directory: ${{ env.PROJECT_DIR }}
        run: pack update-db

      - name: Switch to the bleeding edge compiler
        if: matrix.collection == 'HEAD'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          { echo; echo "[idris2]"; echo 'commit = "latest:main"'; } >> pack.toml
          pack fetch

      - name: Switch collection
        working-directory: ${{ env.PROJECT_DIR }}
        run: pack switch ${{ matrix.collection }}

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          PACKAGE: ${{ needs.get-upstream-matrix.outputs.package }}
        run: pack install-deps "$PACKAGE"

      - name: Fold the pack state into the cache key
        env:
          COLLECTION: ${{ matrix.collection }}
        run: |
          case "$COLLECTION" in
            latest) collection_version="$CURRENT" ;;
            HEAD) collection_version="$UPSTREAM" ;;
            *) collection_version="$COLLECTION" ;;
          esac

          base_cache_key="build-$HASH-$COLLECTION-$collection_version"
          state_dir="${PACK_STATE_DIR:-$HOME/.local/state/pack}"

          # | xargs -0 sha256sum | is skipped to avoid hashing the content of the pack state
          pack_hash=$(find "$state_dir" -print0 2>/dev/null \
            | sort -z | sha256sum | cut -c1-16)

          echo "Pack state hash: $pack_hash"
          echo "CACHE_KEY=$base_cache_key-$pack_hash" >> "$GITHUB_ENV"

      - name: Restore build cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.PROJECT_DIR }}/${{ env.BUILD_DIR }}
          key: ${{ env.CACHE_KEY }}

      - name: Refresh cached file timestamps
        if: steps.cache.outputs.cache-hit == 'true'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          find "$BUILD_DIR" -type f -exec touch {} +
          sync

      - name: Build ${{ needs.get-upstream-matrix.outputs.package }}
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          PACKAGE: ${{ needs.get-upstream-matrix.outputs.package }}
        run: pack build "$PACKAGE"

      - name: Save build cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.PROJECT_DIR }}/${{ env.BUILD_DIR }}
          key: ${{ env.CACHE_KEY }}

      - name: Test ${{ needs.get-upstream-matrix.outputs.package }}
        if: ${{ inputs.run_tests }}
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          PACKAGE: ${{ needs.get-upstream-matrix.outputs.package }}
        run: pack test "$PACKAGE"

      - name: Upload pack state and build dir
        if: ${{ inputs.enable_cache }}
        uses: DepTyCheck/idris2-actions/.github/actions/upload-pack-state@master
        with:
          package: ${{ needs.get-upstream-matrix.outputs.package }}
          mode: ${{ matrix.collection }}
          project_dir: ${{ env.PROJECT_DIR }}
          build_dir: ${{ env.BUILD_DIR }}
