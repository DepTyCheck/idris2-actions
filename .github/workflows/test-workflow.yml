---
name: Test workflow

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read

jobs:
  # Build test libs with different configs
  build-n-test:
    strategy:
      fail-fast: false
      matrix:
        ipkg_path:
          - test_projects/test_no_builddir/test_lib.ipkg
          - test_projects/test_has_builddir/test_lib.ipkg
          - test_projects/test_commented_builddir/test_lib.ipkg
    uses: DepTyCheck/idris2-actions/.github/workflows/build-and-test.yml@master
    with:
      ipkg_path: ${{ matrix.ipkg_path }}
      # These only build & test
      enable_cache: false

  # Build root project, restore it and run
  build-root-for-cache:
    uses: DepTyCheck/idris2-actions/.github/workflows/build-and-test.yml@master

  # Build root project with a hardcoded pack collection.
  build-root-nightly-260407:
    needs: build-root-for-cache # Avoid skipping due to concurrency settings
    uses: DepTyCheck/idris2-actions/.github/workflows/build-and-test.yml@master
    with:
      pack_collections: '["nightly-260407"]'

  run-root-cached:
    needs: build-root-for-cache
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    strategy:
      fail-fast: false
      matrix:
        state: ${{ fromJSON(needs.build-root-for-cache.outputs.pack_states) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore the cached build
        uses: DepTyCheck/idris2-actions/.github/actions/restore-pack-state@master
        with:
          state: ${{ matrix.state }}

      - name: Run the package
        working-directory: ${{ needs.build-root-for-cache.outputs.project_dir }}
        env:
          PACKAGE: ${{ needs.build-root-for-cache.outputs.package }}
        run: pack run "$PACKAGE"

  # Single-collection usage example. Intentionally mirrors run-root-cached, so ignore the near-duplicate block.
  # jscpd:ignore-start
  run-root-single-collection:
    needs: build-root-for-cache
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    outputs:
      state: ${{ steps.upload-pack-state.outputs.state }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore the first collection build
        uses: DepTyCheck/idris2-actions/.github/actions/restore-pack-state@master
        with:
          state: ${{ fromJSON(needs.build-root-for-cache.outputs.pack_states)[0] }}

      - name: Run the package
        working-directory: ${{ needs.build-root-for-cache.outputs.project_dir }}
        env:
          PACKAGE: ${{ needs.build-root-for-cache.outputs.package }}
        run: pack run "$PACKAGE"

      - name: Upload the single-collection pack state
        id: upload-pack-state
        uses: DepTyCheck/idris2-actions/.github/actions/upload-pack-state@master
        with:
          package: ${{ needs.build-root-for-cache.outputs.package }}
          collection: ${{ fromJSON(needs.build-root-for-cache.outputs.collections)[0] }}
          label: single-collection
          project_dir: ${{ needs.build-root-for-cache.outputs.project_dir }}
          build_dir: ${{ needs.build-root-for-cache.outputs.build_dir }}
  # jscpd:ignore-end

  # Restore the custom state uploaded by run-root-single-collection.
  # jscpd:ignore-start
  run-root-custom-state:
    needs:
      - build-root-for-cache
      - run-root-single-collection
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore the custom single-collection state
        uses: DepTyCheck/idris2-actions/.github/actions/restore-pack-state@master
        with:
          state: ${{ needs.run-root-single-collection.outputs.state }}

      - name: Run the package from the custom state
        working-directory: ${{ needs.build-root-for-cache.outputs.project_dir }}
        env:
          PACKAGE: ${{ needs.build-root-for-cache.outputs.package }}
        run: pack run "$PACKAGE"
  # jscpd:ignore-end
