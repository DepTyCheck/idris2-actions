---
name: Test workflow

on:
  push:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read

jobs:
  # Build test libs with different configs
  build-n-test:
    strategy:
      fail-fast: false
      matrix:
        ipkg_path:
          - test_projects/test_no_builddir/test_lib.ipkg
          - test_projects/test_has_builddir/test_lib.ipkg
          - test_projects/test_commented_builddir/test_lib.ipkg
    uses: DepTyCheck/idris2-actions/.github/workflows/build-and-test.yml@master
    with:
      ipkg_path: ${{ matrix.ipkg_path }}
      # These only build & test
      enable_cache: false

  # Build root project, restore it and run
  build-root-for-cache:
    uses: DepTyCheck/idris2-actions/.github/workflows/build-and-test.yml@master

  run-root-cached:
    needs: build-root-for-cache
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJSON(needs.build-root-for-cache.outputs.variants) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore the cached build
        uses: DepTyCheck/idris2-actions/.github/actions/restore-cache@master
        with:
          package: ${{ needs.build-root-for-cache.outputs.package }}
          mode: ${{ matrix.variant.mode }}
          project_dir: ${{ needs.build-root-for-cache.outputs.project_dir }}

      - name: Run the package
        working-directory: ${{ needs.build-root-for-cache.outputs.project_dir }}
        env:
          PACKAGE: ${{ needs.build-root-for-cache.outputs.package }}
        run: pack run "$PACKAGE"

  # Single-variant usage example. Intentionally mirrors run-root-cached, so ignore the near-duplicate block.
  # jscpd:ignore-start
  run-root-single-variant:
    needs: build-root-for-cache
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore the first variant build
        uses: DepTyCheck/idris2-actions/.github/actions/restore-cache@master
        with:
          package: ${{ needs.build-root-for-cache.outputs.package }}
          mode: ${{ fromJSON(needs.build-root-for-cache.outputs.variants)[0].mode }}
          project_dir: ${{ needs.build-root-for-cache.outputs.project_dir }}

      - name: Run the package
        working-directory: ${{ needs.build-root-for-cache.outputs.project_dir }}
        env:
          PACKAGE: ${{ needs.build-root-for-cache.outputs.package }}
        run: pack run "$PACKAGE"

      - name: Upload the single-variant pack state
        uses: DepTyCheck/idris2-actions/.github/actions/upload-pack-state@master
        with:
          package: ${{ needs.build-root-for-cache.outputs.package }}
          mode: ${{ fromJSON(needs.build-root-for-cache.outputs.variants)[0].mode }}
          suffix: single-variant
          project_dir: ${{ needs.build-root-for-cache.outputs.project_dir }}
          build_dir: ${{ needs.build-root-for-cache.outputs.build_dir }}
  # jscpd:ignore-end

  # Restore the custom state uploaded by run-root-single-variant.
  # jscpd:ignore-start
  run-root-custom-state:
    needs:
      - build-root-for-cache
      - run-root-single-variant
    runs-on: ubuntu-latest
    container: ghcr.io/stefan-hoeck/idris2-pack:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore the custom single-variant state
        uses: DepTyCheck/idris2-actions/.github/actions/restore-cache@master
        with:
          package: ${{ needs.build-root-for-cache.outputs.package }}
          mode: ${{ fromJSON(needs.build-root-for-cache.outputs.variants)[0].mode }}
          suffix: single-variant
          project_dir: ${{ needs.build-root-for-cache.outputs.project_dir }}

      - name: Run the package from the custom state
        working-directory: ${{ needs.build-root-for-cache.outputs.project_dir }}
        env:
          PACKAGE: ${{ needs.build-root-for-cache.outputs.package }}
        run: pack run "$PACKAGE"
  # jscpd:ignore-end
